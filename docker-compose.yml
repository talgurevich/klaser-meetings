services:
  postgres:
    image: postgres:16
    container_name: klaser-meetings-postgres
    environment:
      POSTGRES_USER: meetings
      POSTGRES_PASSWORD: meetings
      POSTGRES_DB: meetings
    ports:
      # 5434 matches backend/.env.example's DATABASE_URL default. elrom
      # (Takanon) uses 5433 for its own Postgres — different port so both
      # stacks can run side by side on one machine.
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "meetings"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
